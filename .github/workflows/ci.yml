name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Go — vet, build, test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      # Scope to our own packages — ./... would descend into a Go file vendored
      # under dashboard/node_modules.
      - name: go vet
        run: go vet ./cmd/... ./internal/...
      - name: go build
        run: go build ./cmd/... ./internal/...
      - name: gofmt (must be clean)
        run: |
          out=$(gofmt -l cmd internal)
          if [ -n "$out" ]; then echo "unformatted files:"; echo "$out"; exit 1; fi
      - name: go test (real Redis for the cluster registry)
        env:
          # Exercises the real-Redis scheduler tests instead of skipping them.
          REDIS_URL: redis://127.0.0.1:6379/9
        run: go test ./cmd/... ./internal/...

  sdk-go:
    name: Go SDK — vet, build, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: sdk/go/go.mod
      - run: go vet ./...
      - run: go build ./...
      - name: gofmt (must be clean)
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "unformatted files:"; echo "$out"; exit 1; fi
      # e2e tests need a live orchestrator + Docker sandbox images; they skip
      # unless FLASH_E2E=1. This still compiles them.
      - run: go test ./...

  sdk-python:
    name: Python SDK — build + import + collect
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]'
      - run: python -c "import flash; print(flash.__version__)"
      # e2e tests skip without FLASH_E2E=1; collection still validates them.
      - run: pytest tests --collect-only -q

  dashboard:
    name: Dashboard — lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - name: next build (type-check + lint + compile)
        run: npm run build
